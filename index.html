<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳系統  V2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3 {
            color: #333;
            text-align: center;
        }
        
        /* --- Form & Inputs --- */
        form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .form-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .form-row label {
            flex: 0 0 70px;
            font-weight: bold;
            color: #555;
        }
        /* 統一輸入框與下拉選單的樣式 */
        .form-row input, .form-row select, .form-row textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            font-family: inherit;
        }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.2);
        }
        /* 備註欄位特別處理：只能垂直拉伸 */
        .form-row textarea {
            resize: vertical;
            min-height: 80px;
        }
        #otherCategoryInput { display: none; margin-top: 10px; }
        .full-width { grid-column: 1 / -1; }
        
        button {
            padding: 12px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover { background-color: #0056b3; }
        .submit-btn { grid-column: 1 / -1; font-weight: bold; }

        /* --- Quick Buttons --- */
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 6px;
            border: 1px solid #d0e3f0;
        }
        .quick-buttons button {
            padding: 8px 12px;
            font-size: 14px;
            background-color: #6c757d;
        }
        .quick-buttons button.income-btn { background-color: #28a745; }
        .quick-buttons button.expense-btn { background-color: #dc3545; }
        .quick-buttons button:hover { opacity: 0.8; transform: translateY(-1px); }

        /* --- Summary & Budget --- */
        .month-selector, .data-actions {
            text-align: center;
            margin-bottom: 20px;
        }
        .month-selector select { padding: 8px 15px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
        .summary-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .summary-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            flex: 1 1 180px;
        }
        .summary-box h4 { margin: 0 0 10px 0; color: #666; }
        #incomeTotal, #expenseTotal, #balance, #budgetStatus {
            font-weight: bold;
            font-size: 1.4em;
        }
        .income { color: #28a745; }
        .expense { color: #dc3545; }
        .budget-input-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .budget-input-container input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px; }
        .budget-input-container button { padding: 8px 15px; }
        .budget-warning { color: #dc3545; }
        .budget-ok { color: #28a745; }

        /* --- Filter & List --- */
        .filter-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 100px;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        .filter-container select, .filter-container input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        #recordList {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #recordList li {
            background: #fff;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s;
        }
        #recordList li:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #recordList li.editing { background-color: #fff9e6; border-color: #ffe082; }
        .record-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .record-info span { font-size: 15px; }
        .record-actions { display: flex; gap: 8px; align-items: center; }
        .record-actions button { padding: 6px 12px; font-size: 14px; }
        .delete-btn { background: #dc3545; }
        .edit-btn { background: #ffc107; color: #333; }
        .save-btn { background: #28a745; }
        .cancel-btn { background: #6c757d; }
        
        /* Edit Mode Styles */
        .record-edit-input {
            padding: 6px;
            border: 1px solid #007bff;
            border-radius: 3px;
            margin-right: 5px;
            font-size: 14px;
        }
        .record-amount {
            font-weight: bold;
            font-size: 1.2em;
            padding: 0 20px;
            min-width: 120px;
            text-align: right;
        }

        /* --- Charts (徹底解決無限變長 Bug) --- */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px;
            margin-top: 30px;
        }
        .chart-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            position: relative;
        }
        .chart-box h3 {
            margin-top: 0;
            margin-bottom: 15px; 
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            font-size: 1.1em;
            color: #555;
        }
        /* 這個容器是關鍵！鎖死高度，Chart.js 就不會亂跑 */
        .canvas-container {
            position: relative;
            height: 220px; /* 固定圖表高度，您可以改這裡來調整圓餅圖大小 */
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .no-chart-data {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 1em;
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 10px;
        }

        @media (max-width: 768px) {
            form { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; align-items: stretch; }
            .form-row label { margin-bottom: 5px; }
            .filter-container { grid-template-columns: repeat(2, 1fr); }
            #recordList li { flex-direction: column; align-items: stretch; gap: 15px; }
            .record-amount { text-align: left; padding: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>個人記帳系統 V2.0</h1>
        
        <div class="quick-buttons" id="quickButtons">
            </div>

        <form id="accountingForm">
            <div class="form-row">
                <label for="recordType">類型:</label>
                <select id="recordType" required>
                    <option value="expense">支出</option>
                    <option value="income">收入</option>
                </select>
            </div>
            <div class="form-row">
                <label for="date">日期:</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-row">
                <label for="amount">金額:</label>
                <input type="number" id="amount" placeholder="輸入金額" required min="1">
            </div>
            <div class="form-row">
                <label for="category">類別:</label>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <select id="category" required>
                        <option value="飲食">飲食</option>
                        <option value="住宿">住宿</option>
                        <option value="日常用品">日常用品</option>
                        <option value="零用錢">零用錢</option>
                        <option value="醫療">醫療</option>
                        <option value="交通">交通</option>
                        <option value="娛樂">娛樂</option>
                        <option value="薪資">薪資</option>
                        <option value="投資">投資</option>
                        <option value="其他">其他...</option>
                    </select>
                    <input type="text" id="otherCategoryInput" placeholder="請輸入自訂類別名稱">
                </div>
            </div>
            <div class="form-row full-width">
                <label for="notes">備註:</label>
                <textarea id="notes" placeholder="可選填備註..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">新增紀錄</button>
        </form>

        <hr>

        <h2>結算與預算</h2>
        <div class="budget-input-container">
            <label for="monthlyBudget">每月支出預算:</label>
            <input type="number" id="monthlyBudget" placeholder="輸入預算" min="0" value="0">
            <button id="setBudgetBtn">設定/更新</button>
        </div>
        
        <div class="month-selector">
            <label for="monthSelect">選擇月份:</label>
            <select id="monthSelect"></select>
        </div>
        
        <div class="summary-container">
            <div class="summary-box">
                <h4>總收入</h4>
                <div id="incomeTotal" class="income">0</div>
            </div>
            <div class="summary-box">
                <h4>總支出</h4>
                <div id="expenseTotal" class="expense">0</div>
            </div>
            <div class="summary-box">
                <h4>結餘</h4>
                <div id="balance">0</div>
            </div>
             <div class="summary-box">
                <h4>預算剩餘</h4>
                <div id="budgetStatus">未設定</div>
            </div>
        </div>
        
        <hr>

        <h2>所有紀錄</h2>
        <div class="data-actions">
            <button id="exportCsvBtn">⬇️ 匯出所有紀錄 (CSV)</button>
        </div>

        <div class="filter-container">
            <select id="filterType">
                <option value="">所有類型</option>
                <option value="income">收入</option>
                <option value="expense">支出</option>
            </select>
            <select id="filterCategory">
                <option value="">所有類別</option>
            </select>
            <input type="text" id="filterKeyword" placeholder="備註/類別關鍵字">
            <select id="sortOrder">
                <option value="dateDesc">日期(新→舊)</option>
                <option value="dateAsc">日期(舊→新)</option>
                <option value="amountDesc">金額(高→低)</option>
                <option value="amountAsc">金額(低→高)</option>
            </select>
            <button id="clearFiltersBtn">清除篩選</button>
        </div>

        <ul id="recordList">
            </ul>
        
        <div class="chart-container">
            <div class="chart-box">
                <h3>支出類別圓餅圖</h3>
                <div class="canvas-container">
                    <canvas id="expenseCategoryPieChart"></canvas>
                </div>
                <div id="noExpensePieData" class="no-chart-data" style="display:none;">本月無支出記錄</div>
            </div>
            
            <div class="chart-box">
                <h3>收入類別圓餅圖</h3>
                <div class="canvas-container">
                    <canvas id="incomeCategoryPieChart"></canvas>
                </div>
                <div id="noIncomePieData" class="no-chart-data" style="display:none;">本月無收入記錄</div>
            </div>
            
            <div class="chart-box">
                <h3>收支比例圓餅圖</h3>
                <div class="canvas-container">
                    <canvas id="typePieChart"></canvas>
                </div>
                <div id="noTypePieData" class="no-chart-data" style="display:none;">本月無記錄</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const form = document.getElementById('accountingForm');
            const recordList = document.getElementById('recordList');
            const monthSelect = document.getElementById('monthSelect');
            const categorySelect = document.getElementById('category');
            const otherCategoryInput = document.getElementById('otherCategoryInput');
            const recordTypeSelect = document.getElementById('recordType');
            const dateInput = document.getElementById('date');
            const quickButtonsContainer = document.getElementById('quickButtons');

            const incomeTotalEl = document.getElementById('incomeTotal');
            const expenseTotalEl = document.getElementById('expenseTotal');
            const balanceEl = document.getElementById('balance');
            const budgetStatusEl = document.getElementById('budgetStatus');
            const monthlyBudgetInput = document.getElementById('monthlyBudget');
            const setBudgetBtn = document.getElementById('setBudgetBtn');
            
            const filterTypeEl = document.getElementById('filterType');
            const filterCategoryEl = document.getElementById('filterCategory');
            const filterKeywordEl = document.getElementById('filterKeyword');
            const sortOrderEl = document.getElementById('sortOrder');
            const clearFiltersBtn = document.getElementById('clearFiltersBtn');
            const exportCsvBtn = document.getElementById('exportCsvBtn');

            let expenseCategoryPieChart, incomeCategoryPieChart, typePieChart;

            // --- Data Load ---
            let records = JSON.parse(localStorage.getItem('accountingRecords')) || [];
            let monthlyBudget = parseInt(localStorage.getItem('monthlyBudget')) || 0;
            const defaultCategories = ['飲食', '住宿', '日常用品', '零用錢', '醫療', '交通', '娛樂', '薪資', '投資', '其他'];
            
            // --- Initialization ---
            const today = new Date();
            // 處理時區問題，確保預設日期為本地正確日期
            const localDateStr = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            dateInput.value = localDateStr;
            monthlyBudgetInput.value = monthlyBudget;

            // 監聽類別選擇，如果是「其他」就顯示自訂輸入框
            categorySelect.addEventListener('change', (e) => {
                if (e.target.value === '其他') {
                    otherCategoryInput.style.display = 'block';
                    otherCategoryInput.required = true;
                } else {
                    otherCategoryInput.style.display = 'none';
                    otherCategoryInput.required = false;
                    otherCategoryInput.value = '';
                }
            });

            // CSV 匯出
            function exportRecords() {
                if (records.length === 0) {
                    alert("沒有任何紀錄可供匯出。");
                    return;
                }
                const header = ["日期", "類型", "類別", "金額", "備註"];
                const csvRows = records.map(r => 
                    [
                        `"${r.date}"`,
                        `"${r.type === 'income' ? '收入' : '支出'}"`,
                        `"${r.category}"`,
                        r.amount,
                        `"${r.notes ? r.notes.replace(/"/g, '""') : ''}"`
                    ].join(',')
                );
                
                const csvContent = [header.join(','), ...csvRows].join('\n');
                const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `記帳紀錄_${localDateStr}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            // 設定快速按鈕與篩選器選項
            function setupCategories() {
                const uniqueCategories = [...new Set(records.map(r => r.category))];
                const allCategories = [...new Set([...defaultCategories, ...uniqueCategories])];

                // 準備篩選器的類別選單
                filterCategoryEl.innerHTML = '<option value="">所有類別</option>';
                allCategories.forEach(cat => {
                    if (cat && cat !== '其他') {
                        const option = document.createElement('option');
                        option.value = cat;
                        option.textContent = cat;
                        filterCategoryEl.appendChild(option);
                    }
                });

                // 產生上方快速按鈕
                quickButtonsContainer.innerHTML = '';
                const quickSets = {
                    '飲食': 'expense', '交通': 'expense', '日常用品': 'expense', 
                    '薪資': 'income'
                };
                
                for (const [cat, type] of Object.entries(quickSets)) {
                    const btn = document.createElement('button');
                    btn.textContent = `${type === 'income' ? '➕' : '➖'} ${cat}`;
                    btn.className = `${type}-btn`;
                    btn.type = "button";
                    btn.addEventListener('click', () => {
                        recordTypeSelect.value = type;
                        categorySelect.value = cat;
                        otherCategoryInput.style.display = 'none';
                        otherCategoryInput.required = false;
                        document.getElementById('amount').focus();
                    });
                    quickButtonsContainer.appendChild(btn);
                }
            }

            // 初始化月份選單
            function initializeMonthSelector() {
                monthSelect.innerHTML = '';
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                for (let i = -12; i <= 1; i++) { 
                    const date = new Date(currentYear, currentMonth + i, 1);
                    const year = date.getFullYear();
                    const month = date.getMonth() + 1;
                    const option = document.createElement('option');
                    option.value = `${year}-${month.toString().padStart(2, '0')}`;
                    option.textContent = `${year}年 ${month}月`;
                    monthSelect.appendChild(option);
                }
                monthSelect.value = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}`;
                monthSelect.addEventListener('change', () => {
                    applyFiltersAndSort();
                    updateSummaryAndCharts();
                });
            }
            
            // 設定預算
            setBudgetBtn.addEventListener('click', () => {
                const newBudget = parseInt(monthlyBudgetInput.value);
                if (newBudget >= 0) {
                    monthlyBudget = newBudget;
                    localStorage.setItem('monthlyBudget', monthlyBudget);
                    alert(`預算已更新為 $${monthlyBudget.toLocaleString()}`);
                    updateSummaryAndCharts();
                } else {
                    alert("請輸入有效的預算。");
                }
            });

            // 新增紀錄送出
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const recordType = recordTypeSelect.value;
                const amount = parseFloat(document.getElementById('amount').value);
                let category = categorySelect.value;
                const notes = document.getElementById('notes').value;
                const date = document.getElementById('date').value;

                if (category === '其他') {
                    category = otherCategoryInput.value.trim() || '其他';
                }

                if (isNaN(amount) || amount <= 0) {
                    alert('請輸入大於0的金額！');
                    return;
                }

                const newRecord = {
                    id: Date.now(),
                    type: recordType,
                    amount: amount,
                    category: category,
                    notes: notes,
                    date: date,
                };
                
                records.unshift(newRecord);
                localStorage.setItem('accountingRecords', JSON.stringify(records));

                // 重設表單，但保留日期
                const savedDate = dateInput.value;
                form.reset();
                dateInput.value = savedDate;
                
                otherCategoryInput.style.display = 'none';
                otherCategoryInput.required = false;
                
                setupCategories();
                applyFiltersAndSort();
                updateSummaryAndCharts();
            });

            // 刪除紀錄
            window.deleteRecord = function(id) {
                if (confirm('確定要刪除這筆紀錄嗎？')) {
                    records = records.filter(record => record.id !== id);
                    localStorage.setItem('accountingRecords', JSON.stringify(records));
                    setupCategories();
                    applyFiltersAndSort();
                    updateSummaryAndCharts();
                }
            };
            
            // 編輯紀錄 (展開編輯表單)
            window.editRecord = function(id) {
                const li = document.querySelector(`#recordList li[data-id="${id}"]`);
                
                document.querySelectorAll('.editing').forEach(el => {
                    if (el !== li) el.classList.remove('editing');
                });
                applyFiltersAndSort(); // 重新渲染列表以取消其他編輯狀態

                const record = records.find(r => r.id === id);
                if (!record) return;

                // 重新抓取一次 DOM，因為剛剛重新渲染過了
                const targetLi = document.querySelector(`#recordList li[data-id="${id}"]`);
                targetLi.classList.add('editing');

                targetLi.innerHTML = `
                    <div class="record-info" style="width: 100%;">
                        <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
                            <input type="date" value="${record.date}" id="edit-date-${id}" class="record-edit-input">
                            <select id="edit-type-${id}" class="record-edit-input">
                                <option value="expense" ${record.type === 'expense' ? 'selected' : ''}>支出</option>
                                <option value="income" ${record.type === 'income' ? 'selected' : ''}>收入</option>
                            </select>
                            <input type="text" value="${record.category}" id="edit-category-${id}" class="record-edit-input" placeholder="類別">
                            <input type="number" value="${record.amount}" id="edit-amount-${id}" class="record-edit-input" min="1" placeholder="金額" style="width: 100px;">
                        </div>
                        <textarea id="edit-notes-${id}" class="record-edit-input" style="width:100%; resize:vertical; min-height:50px;" placeholder="備註">${record.notes || ''}</textarea>
                        
                        <div class="record-actions" style="margin-top: 10px; justify-content: flex-end;">
                            <button class="save-btn" onclick="saveRecord(${id})">儲存</button>
                            <button class="cancel-btn" onclick="applyFiltersAndSort()">取消</button>
                        </div>
                    </div>
                `;
            };

            // 儲存編輯紀錄
            window.saveRecord = function(id) {
                const index = records.findIndex(r => r.id === id);
                if (index === -1) return;

                const newAmount = parseFloat(document.getElementById(`edit-amount-${id}`).value);
                const newType = document.getElementById(`edit-type-${id}`).value;
                const newCategory = document.getElementById(`edit-category-${id}`).value.trim();
                const newNotes = document.getElementById(`edit-notes-${id}`).value;
                const newDate = document.getElementById(`edit-date-${id}`).value;

                if (isNaN(newAmount) || newAmount <= 0 || !newCategory) {
                    alert('請確認金額大於0且類別已填寫！');
                    return;
                }

                records[index] = {
                    ...records[index],
                    type: newType,
                    amount: newAmount,
                    category: newCategory,
                    notes: newNotes,
                    date: newDate,
                };
                
                localStorage.setItem('accountingRecords', JSON.stringify(records));
                setupCategories();
                applyFiltersAndSort();
                updateSummaryAndCharts();
            };

            // 篩選與排序邏輯
            function applyFiltersAndSort() {
                const currentMonthValue = monthSelect.value;
                const [year, month] = currentMonthValue.split('-').map(Number);
                
                const filterType = filterTypeEl.value;
                const filterCategory = filterCategoryEl.value;
                const filterKeyword = filterKeywordEl.value.toLowerCase();
                const sortOrder = sortOrderEl.value;

                let filtered = records.filter(record => {
                    const d = new Date(record.date);
                    return d.getFullYear() === year && d.getMonth() + 1 === month;
                });
                
                if (filterType) filtered = filtered.filter(r => r.type === filterType);
                if (filterCategory) filtered = filtered.filter(r => r.category === filterCategory);
                if (filterKeyword) {
                    filtered = filtered.filter(r => 
                        r.category.toLowerCase().includes(filterKeyword) || 
                        (r.notes && r.notes.toLowerCase().includes(filterKeyword))
                    );
                }

                filtered.sort((a, b) => {
                    if (sortOrder === 'dateDesc') return new Date(b.date) - new Date(a.date);
                    if (sortOrder === 'dateAsc') return new Date(a.date) - new Date(b.date);
                    if (sortOrder === 'amountDesc') return b.amount - a.amount;
                    if (sortOrder === 'amountAsc') return a.amount - b.amount;
                    return 0;
                });

                renderRecords(filtered);
            }

            // 綁定篩選器事件
            [filterTypeEl, filterCategoryEl, filterKeywordEl, sortOrderEl].forEach(el => {
                el.addEventListener('change', applyFiltersAndSort);
                el.addEventListener('input', applyFiltersAndSort);
            });
            
            clearFiltersBtn.addEventListener('click', () => {
                filterTypeEl.value = '';
                filterCategoryEl.value = '';
                filterKeywordEl.value = '';
                sortOrderEl.value = 'dateDesc';
                applyFiltersAndSort();
            });
            
            exportCsvBtn.addEventListener('click', exportRecords);

            // 渲染列表 HTML
            function renderRecords(list) {
                recordList.innerHTML = '';
                if (list.length === 0) {
                    recordList.innerHTML = '<li style="justify-content:center; color:#888;">本月尚無符合紀錄</li>';
                    return;
                }

                list.forEach(record => {
                    const li = document.createElement('li');
                    li.dataset.id = record.id;
                    const typeText = record.type === 'income' ? '收入' : '支出';
                    const amountClass = record.type === 'income' ? 'income' : 'expense';
                    const sign = record.type === 'income' ? '+' : '-';

                    li.innerHTML = `
                        <div class="record-info">
                            <span>📅 <strong>${record.date}</strong> <span style="color:#888; font-size:13px;">(${typeText})</span></span>
                            <span>🏷️ 類別: ${record.category}</span>
                            ${record.notes ? `<span style="color:#666;">📝 備註: ${record.notes}</span>` : ''}
                        </div>
                        <div class="record-amount ${amountClass}">
                            ${sign} $${record.amount.toLocaleString()}
                        </div>
                        <div class="record-actions">
                            <button class="edit-btn" onclick="editRecord(${record.id})">編輯</button>
                            <button class="delete-btn" onclick="deleteRecord(${record.id})">刪除</button>
                        </div>
                    `;
                    recordList.appendChild(li);
                });
            }

            // 更新統計看板與圖表
            function updateSummaryAndCharts() {
                const currentMonthValue = monthSelect.value;
                const [year, month] = currentMonthValue.split('-').map(Number);

                const currentMonthRecords = records.filter(record => {
                    const d = new Date(record.date);
                    return d.getFullYear() === year && d.getMonth() + 1 === month;
                });

                let incomeTotal = 0;
                let expenseTotal = 0;
                
                currentMonthRecords.forEach(r => {
                    if (r.type === 'income') incomeTotal += r.amount;
                    else expenseTotal += r.amount;
                });

                const balance = incomeTotal - expenseTotal;
                const budgetRemaining = monthlyBudget - expenseTotal;

                incomeTotalEl.textContent = `$${incomeTotal.toLocaleString()}`;
                expenseTotalEl.textContent = `$${expenseTotal.toLocaleString()}`;
                balanceEl.textContent = `$${balance.toLocaleString()}`;
                balanceEl.style.color = balance < 0 ? '#dc3545' : '#333';

                if (monthlyBudget > 0) {
                    budgetStatusEl.textContent = `$${budgetRemaining.toLocaleString()}`;
                    budgetStatusEl.className = budgetRemaining < 0 ? 'budget-warning' : 'budget-ok';
                } else {
                    budgetStatusEl.textContent = '未設定';
                    budgetStatusEl.className = '';
                }

                updateCharts(currentMonthRecords, incomeTotal, expenseTotal);
            }

            // 更新 Chart.js 圖表
            function updateCharts(data, incomeTotal, expenseTotal) {
                const pieColors = ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40', '#6666ff', '#58c9b9', '#ff8484', '#a1c181'];
                
                // 這是確保圖表不會無窮放大的核心設定
                const chartOptions = { 
                    responsive: true, 
                    maintainAspectRatio: false, // 搭配 CSS 的固定高度，完美限制大小
                    plugins: {
                        legend: { position: 'right' } // 將圖例放右邊，視覺上更緊湊
                    }
                };

                // --- 1. Expense Pie ---
                const expenseData = data.filter(r => r.type === 'expense');
                const expCategories = [...new Set(expenseData.map(r => r.category))];
                const expAmounts = expCategories.map(cat => 
                    expenseData.filter(r => r.category === cat).reduce((sum, r) => sum + r.amount, 0)
                );
                
                document.getElementById('noExpensePieData').style.display = expAmounts.length > 0 ? 'none' : 'block';
                if (expenseCategoryPieChart) expenseCategoryPieChart.destroy();
                
                if (expAmounts.length > 0) {
                    expenseCategoryPieChart = new Chart(document.getElementById('expenseCategoryPieChart').getContext('2d'), {
                        type: 'doughnut', // 改成環形圖看起來更現代一點
                        data: {
                            labels: expCategories,
                            datasets: [{ data: expAmounts, backgroundColor: pieColors }]
                        },
                        options: chartOptions
                    });
                }

                // --- 2. Income Pie ---
                const incomeData = data.filter(r => r.type === 'income');
                const incCategories = [...new Set(incomeData.map(r => r.category))];
                const incAmounts = incCategories.map(cat => 
                    incomeData.filter(r => r.category === cat).reduce((sum, r) => sum + r.amount, 0)
                );
                
                document.getElementById('noIncomePieData').style.display = incAmounts.length > 0 ? 'none' : 'block';
                if (incomeCategoryPieChart) incomeCategoryPieChart.destroy();
                
                if (incAmounts.length > 0) {
                    incomeCategoryPieChart = new Chart(document.getElementById('incomeCategoryPieChart').getContext('2d'), {
                        type: 'doughnut',
                        data: {
                            labels: incCategories,
                            datasets: [{ data: incAmounts, backgroundColor: pieColors }]
                        },
                        options: chartOptions
                    });
                }

                // --- 3. Total Pie ---
                document.getElementById('noTypePieData').style.display = (incomeTotal > 0 || expenseTotal > 0) ? 'none' : 'block';
                if (typePieChart) typePieChart.destroy();
                
                if (incomeTotal > 0 || expenseTotal > 0) {
                    typePieChart = new Chart(document.getElementById('typePieChart').getContext('2d'), {
                        type: 'pie',
                        data: {
                            labels: ['總收入', '總支出'],
                            datasets: [{
                                data: [incomeTotal, expenseTotal],
                                backgroundColor: ['#28a745', '#dc3545']
                            }]
                        },
                        options: chartOptions
                    });
                }
            }

            // --- 啟動初始化 ---
            setupCategories();
            initializeMonthSelector();
            applyFiltersAndSort(); 
            updateSummaryAndCharts();
        });
    </script>
</body>
</html>
